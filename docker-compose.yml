services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knobs_example
      POSTGRES_USER: knobs
      POSTGRES_PASSWORD: knobs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knobs -d knobs_example"]
      interval: 3s
      timeout: 5s
      retries: 10
